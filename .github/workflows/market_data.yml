name: Market Data ETL

on:
  schedule:
    - cron: '0 1 * * 2-6'
  workflow_dispatch:

jobs:
  run-market-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'cron_jobs/requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r cron_jobs/requirements.txt

    - name: Run Market Data ETL
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python cron_jobs/run_market_data.py