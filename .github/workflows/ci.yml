name: CI Pipeline - Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build API Image
      uses: docker/build-push-action@v4
      with:
        context: ./api
        push: false
        tags: genai_api:latest

    - name: Build Worker Image
      uses: docker/build-push-action@v4
      with:
        context: ./worker
        push: false
        tags: genai_worker:latest

    - name: Build Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
        tags: genai_frontend:latest