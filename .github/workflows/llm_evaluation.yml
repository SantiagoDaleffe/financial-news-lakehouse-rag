name: LLM Intelligence & RAGAS Evaluation

on:
  push:
    #paths:
    #  - 'api/app/prompts/agent_skills.md'
    #  - 'api/app/routers/agent.py'
    #  - 'eval/**'

jobs:
  evaluate-agent:
    name: Run LLM & RAG Metrics Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pandas google-genai mlflow python-dotenv

      - name: Execute Tool Calling Accuracy Test
        env:
          PYTHONPATH: .
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          DATABASE_URL: "sqlite:///:memory:"
        run: python eval/evaluate_baseline.py

      - name: Execute RAG Faithfulness & Relevance Test
        env:
          PYTHONPATH: .
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MLFLOW_TRACKING_URI: "http://localhost:5000"
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: "dummy_index"
        run: python eval/evaluate_rag.py