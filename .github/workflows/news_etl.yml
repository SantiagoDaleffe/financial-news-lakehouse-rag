name: Financial News ETL

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-news-ingestion:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt 

    - name: Run News ETL
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        INGESTION_API_URL: ${{ secrets.INGESTION_API_URL }}
      run: |
        python cron_jobs/run_news_etl.py