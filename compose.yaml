services:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_LOGS=warning
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
      mlflow:
        condition: service_started
      airflow-postgres:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}/
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow_secure_pass_replace_me}@airflow-postgres:5432/${POSTGRES_DB:-airflow}
      - GIT_PYTHON_REFRESH=quiet
      - CHROMA_HOST=${CHROMA_HOST}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}

  alert-worker:
    build: ./api
    command: python app/alert_worker.py
    depends_on:
      airflow-postgres:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow_secure_pass_replace_me}@airflow-postgres:5432/${POSTGRES_DB:-airflow}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    extra_hosts:
      - "api.telegram.org:149.154.166.110"

  worker:
    build: ./worker
    depends_on:
      - rabbitmq
      - minio
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}/
      - CHROMA_HOST=${CHROMA_HOST}

  chromadb:
    image: chromadb/chroma:0.4.24
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_data:/chroma/chroma

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow_data
    command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow_data/mlflow.db

  airflow-postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-airflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow_secure_pass_replace_me}
      - POSTGRES_DB=${POSTGRES_DB:-airflow}
    ports:
      - "5432:5432"
    volumes:
      - ./airflow_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}" ]
      interval: 5s
      retries: 5

  airflow-init:
    build: 
      context: ./airflow
      dockerfile: Dockerfile.airflow
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow_secure_pass_replace_me}@airflow-postgres/${POSTGRES_DB:-airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    depends_on:
      airflow-postgres:
        condition: service_healthy
    command: >
      bash -c " airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USERNAME:-admin} --firstname ${AIRFLOW_ADMIN_FIRSTNAME:-Admin} --lastname ${AIRFLOW_ADMIN_LASTNAME:-User} --role Admin --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} --password ${AIRFLOW_ADMIN_PASSWORD:-admin_secure_pass_replace_me} "

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile.airflow
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow_secure_pass_replace_me}@airflow-postgres/${POSTGRES_DB:-airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - NEWS_API_KEY=${NEWS_API_KEY}
      - INGESTION_API_URL=http://api:8000/api/v1/ingest
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    command: bash -c "airflow webserver & airflow scheduler"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      api:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@test.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin_secure_pass_replace_me}
    ports:
      - "5050:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    depends_on:
      airflow-postgres:
        condition: service_healthy